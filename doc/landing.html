<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Embedded SDK Documentation</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #0b6bcb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eef2f7, #f8fafc);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 28px rgba(31, 41, 55, 0.08);
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    p { margin: 0 0 18px; color: var(--muted); }
    .links { display: grid; gap: 12px; }
    a {
      display: block;
      text-decoration: none;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #dbe3ee;
      color: var(--text);
      font-weight: 600;
    }
    a:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Embedded SDK Documentation</h1>
    <p>Choose the documentation variant:</p>
    <div class="links">
      <a href="wallet/index.html">Wallet documentation (Stax/Flex/Apex)</a>
      <a href="nano/index.html">Nano documentation (Nano targets)</a>
    </div>
  </main>
</body>
</html>
