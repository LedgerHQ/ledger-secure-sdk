# SDK self-fuzz manifest (multi-target).
#
# Each [[targets]] entry is a separate fuzzer binary exercising one SDK library.
# Run all:   app-campaign.sh --app-dir $SDK --fuzz-subdir fuzzing/sdk-fuzz
# Run some:  ... --target fuzz_alloc --target fuzz_lists

[sdk]
harness_version = "2"

[coverage]
exclude_regexes = [
    '.*fuzzing/mock/.*',
    '.*fuzzing/sdk-fuzz/mock/.*',
    '.*fuzzer\.c',
    '.*fuzz_dispatcher\.c',
]

# ── Stateful targets ─────────────────────────────────────────────────────────

[[targets]]
fuzzer = "fuzz_alloc"
key_files = ["lib_alloc/mem_alloc.c"]
seeds = { cla = 0x00, ins = [0x01] }

[targets.dictionary]
tokens = [
    { name = "op_alloc",   value = "M" },
    { name = "op_free",    value = "F" },
    { name = "op_realloc", value = "R" },
    { name = "op_stat",    value = "S" },
    { name = "op_parse",   value = "P" },
    { name = "sz_zero",    value = "\\x00\\x00" },
    { name = "sz_one",     value = "\\x01\\x00" },
    { name = "sz_8",       value = "\\x08\\x00" },
    { name = "sz_256",     value = "\\x00\\x01" },
    { name = "sz_max",     value = "\\xF0\\x7F" },
]

[[targets]]
fuzzer = "fuzz_alloc_utils"
key_files = ["lib_alloc/app_mem_utils.c"]
seeds = { cla = 0x00, ins = [0x01] }

[targets.dictionary]
tokens = [
    { name = "op0_alloc",   value = "\\x00" },
    { name = "op1_calloc",  value = "\\x01" },
    { name = "op2_strdup",  value = "\\x02" },
    { name = "op3_free",    value = "\\x03" },
    { name = "op4_freenul", value = "\\x04" },
]

[[targets]]
fuzzer = "fuzz_lists"
key_files = ["lib_lists/lists.c"]
seeds = { cla = 0x00, ins = [0x01] }

[targets.dictionary]
tokens = [
    { name = "op_push_front",    value = "\\x00" },
    { name = "op_push_back",     value = "\\x01" },
    { name = "op_pop_front",     value = "\\x02" },
    { name = "op_pop_back",      value = "\\x03" },
    { name = "op_insert_after",  value = "\\x04" },
    { name = "op_insert_before", value = "\\x05" },
    { name = "op_remove",        value = "\\x06" },
    { name = "op_clear",         value = "\\x07" },
    { name = "op_sort",          value = "\\x08" },
    { name = "op_size",          value = "\\x09" },
    { name = "op_reverse",       value = "\\x0A" },
    { name = "op_empty",         value = "\\x0B" },
    { name = "op_remove_if",     value = "\\x0C" },
    { name = "op_unique",        value = "\\x0D" },
    { name = "doubly_flag",      value = "\\x80" },
]

