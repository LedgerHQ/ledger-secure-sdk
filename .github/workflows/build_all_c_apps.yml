name: Build all C apps on latest C SDK

on:
  workflow_dispatch:
    inputs:
      sdk_branch:
        type: string
        required: false
        default: ''
  pull_request:

jobs:
  prepare-matrix:
    name: Retrieve C apps
    runs-on: ubuntu-latest
    outputs:
      c_apps: ${{ steps.get_c_apps.outputs.c_apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.x'
      - name: Install ledgered
        run: pip install ledgered
      - name: Get all C apps
        id: get_c_apps
        run: |
          python .github/workflows/scripts/get_c_apps.py ${{ secrets.GITHUB_TOKEN }}
          python - <<'PY'
          import json

          REQUIRED_APPS = [
            "app-bitcoin-new",
            "app-ethereum",
            "app-solana",
            "app-exchange",
          ]

          with open("c_apps.json", "r", encoding="utf-8") as f:
            all_apps = json.load(f)

          if not isinstance(all_apps, list):
            raise SystemExit("Expected c_apps.json to contain a JSON array")

          by_name = {app.get("app-name"): app for app in all_apps if isinstance(app, dict)}
          selected = []
          missing_required = []

          for app_name in REQUIRED_APPS:
            app = by_name.get(app_name)
            if app is None:
              missing_required.append(app_name)
            else:
              selected.append(app)

          if missing_required:
            raise SystemExit(
              "Missing required apps in matrix source: " + ", ".join(missing_required)
            )

          with open("c_apps_limited.json", "w", encoding="utf-8") as f:
            json.dump(selected, f)
          PY
          echo "c_apps=$(cat c_apps_limited.json)" >> $GITHUB_OUTPUT

  print-matrix:
    needs: [prepare-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Print matrix
        run: |
          echo "Matrix content: ${{ needs.prepare-matrix.outputs.c_apps }}"

  test-build:
    name: Build for all targets
    needs: [prepare-matrix]
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJSON(needs.prepare-matrix.outputs.c_apps) }}
        builder:
          - name: app-builder-latest
            image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:latest
            sdk_ref: API_LEVEL_26
            extra_flags: ''
          - name: clang21-testing
            image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder-clang21-testing:latest
            sdk_ref: mbr/stack-protection
            extra_flags: ''
          # - name: clang21-stack-protector
          #   image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder-clang21-testing:latest
          #   sdk_ref: mbr/stack-protection
          #   extra_flags: '-fstack-protector-strong'
            # -Wl,--wrap=__stack_chk_fail -Wl,--wrap=__stack_chk_init
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.builder.image }}

    steps:
      - name: Clone App
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/${{ matrix.apps.app-name }}
          submodules: recursive
          path: ${{ matrix.apps.app-name }}
      - name: Clone SDK
        uses: actions/checkout@v4
        with:
          path: sdk
          ref: ${{ matrix.builder.sdk_ref }}

      - name: Install prerequisites
        run: pip install --break-system-packages ledgered

      - name: Build App for Nano X
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git --no-pager log -1 && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Nano X"
          make clean
          make TARGET=nanox BOLOS_SDK=$GITHUB_WORKSPACE/sdk ${{ matrix.builder.extra_flags && format('EXTRA_CFLAGS={0}', matrix.builder.extra_flags) || '' }}
      - name: Upload Nano X ELF
        if: contains(matrix.apps.devices, 'nanox')
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.apps.app-name }}-nanox-${{ matrix.builder.name }}
          path: ${{ matrix.apps.app-name }}/build
      - name: Build App for Nano S+
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git --no-pager log -1 && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Nano S+"
          make clean
          make TARGET=nanos2 BOLOS_SDK=$GITHUB_WORKSPACE/sdk ${{ matrix.builder.extra_flags && format('EXTRA_CFLAGS={0}', matrix.builder.extra_flags) || '' }}
      - name: Upload Nano S+ ELF
        if: contains(matrix.apps.devices, 'nanos+')
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.apps.app-name }}-nanos2-${{ matrix.builder.name }}
          path: ${{ matrix.apps.app-name }}/build
      - name: Build App for Stax
        if: contains(matrix.apps.devices, 'stax')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git --no-pager log -1 && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Stax"
          make clean
          make TARGET=stax BOLOS_SDK=$GITHUB_WORKSPACE/sdk ${{ matrix.builder.extra_flags && format('EXTRA_CFLAGS={0}', matrix.builder.extra_flags) || '' }}
      - name: Upload Stax ELF
        if: contains(matrix.apps.devices, 'stax')
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.apps.app-name }}-stax-${{ matrix.builder.name }}
          path: ${{ matrix.apps.app-name }}/build
      - name: Build App for Flex
        if: contains(matrix.apps.devices, 'flex')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git --no-pager log -1 && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Flex"
          make clean
          make TARGET=flex BOLOS_SDK=$GITHUB_WORKSPACE/sdk ${{ matrix.builder.extra_flags && format('EXTRA_CFLAGS={0}', matrix.builder.extra_flags) || '' }}
      - name: Upload Flex ELF
        if: contains(matrix.apps.devices, 'flex')
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.apps.app-name }}-flex-${{ matrix.builder.name }}
          path: ${{ matrix.apps.app-name }}/build
      - name: Build App for Apex+
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git --no-pager log -1 && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Apex+"
          make clean
          make TARGET=apex_p BOLOS_SDK=$GITHUB_WORKSPACE/sdk ${{ matrix.builder.extra_flags && format('EXTRA_CFLAGS={0}', matrix.builder.extra_flags) || '' }}
      - name: Upload Apex+ ELF
        if: contains(matrix.apps.devices, 'apex_p')
        uses: actions/upload-artifact@v4
        with:
          name: elf-${{ matrix.apps.app-name }}-apex_p-${{ matrix.builder.name }}
          path: ${{ matrix.apps.app-name }}/build

  merge-artifacts:
    name: Merge artifacts
    runs-on: ubuntu-latest
    needs: [test-build]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: elf-*-*-*
          path: downloaded_artifacts

      - name: install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tree
      - name: Merge into single zip
        run: |
          echo "Listing downloaded artifacts tree"
          tree downloaded_artifacts

          mkdir -p merged_artifacts
          shopt -s nullglob

          for artifact_dir in downloaded_artifacts/elf-*-*-*; do
            artifact_name=$(basename "$artifact_dir")

            builder=""
            for b in app-builder-latest clang21-stack-protector clang21-testing; do
              if [[ "$artifact_name" == *-"$b" ]]; then
                builder="$b"
                break
              fi
            done
            if [[ -z "$builder" ]]; then
              echo "Skipping unknown artifact format: $artifact_name"
              continue
            fi

            no_prefix="${artifact_name#elf-}"
            no_builder="${no_prefix%-${builder}}"

            target=""
            for t in nanox nanos2 stax flex apex_p; do
              if [[ "$no_builder" == *-"$t" ]]; then
                target="$t"
                break
              fi
            done
            if [[ -z "$target" ]]; then
              echo "Skipping unknown target in artifact: $artifact_name"
              continue
            fi

            app_name="${no_builder%-${target}}"
            app_name="${app_name%-}"

            dest="merged_artifacts/${app_name}/${builder}/${target}"
            mkdir -p "$dest"
            cp -a "$artifact_dir"/. "$dest"/
          done

          echo "Merged tree:"
          tree merged_artifacts

          cd merged_artifacts && zip -r ../all_builds.zip .
      - name: Upload merged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-builds
          path: all_builds.zip
              
  # compare builds in the following fashion :
  # | App name        | Target | app-builder-latest .text size     | clang21-testing .text size | Size difference |
  # | app-bitcoin-new | flex   | X                                 | Y                          | +k bytes        |
  # | app-bitcoin-new | stax   | X                                 | Y                          | -1%             |
  # | app-bitcoin-new | apex_p | X                                 | Y                          | +0.5%           |
  # | app-bitcoin-new | nanox  | X                                 | Y                          | +1%             |
  # | app-bitcoin-new | nanos+ | X                                 | Y                          | +0.5%           |
  # | app-ethereum    | flex   | X                                 | Y                          | +3%             |
  # | app-ethereum    | stax   | X                                 | Y                          | +1%             |
  # | app-ethereum    | apex_p | X                                 | Y                          | +0.5%           |
  # etc.
  compare-builds:
    name: Compare builds
    needs: [test-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: elf-*-*-*
          path: downloaded_artifacts
      - name: install apt dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends binutils tree

      - name: Compare .text section sizes
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import subprocess

          artifacts_root = pathlib.Path("downloaded_artifacts")
          target_pattern = "nanox|nanos2|stax|flex|apex_p"
          name_re = re.compile(rf"^elf-(?P<app>.+)-(?P<target>{target_pattern})-(?P<builder>.+)$")

          # (app, target) -> {builder: text_size}
          rows = {}

          for artifact_dir in sorted(artifacts_root.glob("elf-*-*-*")):
              if not artifact_dir.is_dir():
                  continue

              m = name_re.match(artifact_dir.name)
              if not m:
                  continue

              app = m.group("app")
              target = m.group("target")
              builder = m.group("builder")

              elf_files = sorted(artifact_dir.rglob("*.elf"))
              if not elf_files:
                  continue

              # One artifact is expected to contain one final ELF. If there are many,
              # keep the first one in lexical order for stable results.
              elf = elf_files[0]
              out = subprocess.check_output(["size", "-A", str(elf)], text=True)

              text_size = None
              for line in out.splitlines():
                  cols = line.split()
                  if len(cols) >= 2 and cols[0] == ".text":
                      text_size = int(cols[1])
                      break
              if text_size is None:
                  continue

              rows.setdefault((app, target), {})[builder] = text_size

          preferred = ["app-builder-latest", "clang21-testing", "clang21-stack-protector"]
          builders = []
          seen = set()
          for b in preferred:
              for data in rows.values():
                  if b in data and b not in seen:
                      builders.append(b)
                      seen.add(b)
          for data in rows.values():
              for b in sorted(data):
                  if b not in seen:
                      builders.append(b)
                      seen.add(b)

          header = ["App name", "Target"] + [f"{b} .text size" for b in builders]
          header.append("clang21-testing vs baseline")
          header.append("clang21-stack-protector vs baseline")

          md_lines = [
              "| " + " | ".join(header) + " |",
              "| " + " | ".join(["---"] * len(header)) + " |",
          ]

          for app, target in sorted(rows):
              data = rows[(app, target)]
              values = [data.get(b) for b in builders]

              diff_clang = "N/A"
              if "app-builder-latest" in data and "clang21-testing" in data:
                  base = data["app-builder-latest"]
                  delta = data["clang21-testing"] - base
                  diff_clang = f"{delta:+d} bytes"

              diff_sp = "N/A"
              if "app-builder-latest" in data and "clang21-stack-protector" in data:
                  base = data["app-builder-latest"]
                  delta = data["clang21-stack-protector"] - base
                  diff_sp = f"{delta:+d} bytes"

              row = [app, target] + [str(v) if v is not None else "N/A" for v in values] + [diff_clang, diff_sp]
              md_lines.append("| " + " | ".join(row) + " |")

          pathlib.Path("build_sizes.md").write_text("\n".join(md_lines) + "\n", encoding="utf-8")
          PY
          cat build_sizes.md

      - name: Upload comparison results
        uses: actions/upload-artifact@v4
        with:
          name: build-size-comparison
          path: build_sizes.md

      - name: Print build_size comparison in workflow summary
        run: cat build_sizes.md >> $GITHUB_STEP_SUMMARY

  cleanup-artifacts:
    name: Cleanup intermediate artifacts
    needs: [merge-artifacts, compare-builds]
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all artifacts except all-builds
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run_id = context.runId;
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id, per_page: 100 }
            );

            for (const artifact of artifacts) {
              if (artifact.name === "all-builds") {
                core.info(`Keeping artifact: ${artifact.name}`);
                continue;
              }

              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted artifact: ${artifact.name}`);
            }
