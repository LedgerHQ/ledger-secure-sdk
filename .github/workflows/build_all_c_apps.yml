name: Build all C apps on latest C SDK

on:
  workflow_dispatch:
    inputs:
      sdk_branch:
        type: string
        required: false
        default: ''
  pull_request:

jobs:
  prepare-matrix:
    name: Retrieve C apps
    runs-on: ubuntu-latest
    outputs:
      c_apps: ${{ steps.get_c_apps.outputs.c_apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.x'
      - name: Install ledgered
        run: pip install ledgered
      - name: Get all C apps
        id: get_c_apps
        run: |
          python .github/workflows/scripts/get_c_apps.py ${{ secrets.GITHUB_TOKEN }}
          python - <<'PY'
          import json

          REQUIRED_APPS = [
            "app-bitcoin-new",
            "app-ethereum",
            "app-solana",
            "app-exchange",
          ]

          with open("c_apps.json", "r", encoding="utf-8") as f:
            all_apps = json.load(f)

          if not isinstance(all_apps, list):
            raise SystemExit("Expected c_apps.json to contain a JSON array")

          by_name = {app.get("app-name"): app for app in all_apps if isinstance(app, dict)}
          selected = []
          missing_required = []

          for app_name in REQUIRED_APPS:
            app = by_name.get(app_name)
            if app is None:
              missing_required.append(app_name)
            else:
              selected.append(app)

          if missing_required:
            raise SystemExit(
              "Missing required apps in matrix source: " + ", ".join(missing_required)
            )

          with open("c_apps_limited.json", "w", encoding="utf-8") as f:
            json.dump(selected, f)
          PY
          echo "c_apps=$(cat c_apps_limited.json)" >> $GITHUB_OUTPUT

  print-matrix:
    needs: [prepare-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Print matrix
        run: |
          echo "Matrix content: ${{ needs.prepare-matrix.outputs.c_apps }}"

  test-build:
    name: Build for all targets
    needs: [prepare-matrix]
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJSON(needs.prepare-matrix.outputs.c_apps) }}
        builder_image:
          - ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:latest
          - ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder-clang21-testing:latest
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.builder_image }}

    steps:
      - name: Clone App
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/${{ matrix.apps.app-name }}
          submodules: recursive
          path: ${{ matrix.apps.app-name }}
      - name: Clone SDK
        uses: actions/checkout@v4
        with:
          path: sdk
          ref: ${{ inputs.sdk_branch || (matrix.builder_image == 'ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder-clang21-testing:latest' && 'mbr/poc-stack-protection' || github.head_ref) }}

      - name: Install prerequisites
        run: pip install --break-system-packages ledgered

      - name: Build App for Nano X
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git status && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Nano X"
          make clean
          make TARGET=nanox BOLOS_SDK=$GITHUB_WORKSPACE/sdk
      - name: Build App for Nano S+
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git status && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Nano S+"
          make clean
          make TARGET=nanos2 BOLOS_SDK=$GITHUB_WORKSPACE/sdk
      - name: Build App for Stax
        if: contains(matrix.apps.devices, 'stax')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git status && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Stax"
          make clean
          make TARGET=stax BOLOS_SDK=$GITHUB_WORKSPACE/sdk
      - name: Build App for Flex
        if: contains(matrix.apps.devices, 'flex')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git status && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Flex"
          make clean
          make TARGET=flex BOLOS_SDK=$GITHUB_WORKSPACE/sdk
      - name: Build App for Apex+
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          cd $GITHUB_WORKSPACE/sdk && git status && cd -
          cd ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}
          echo "Building for Apex+"
          make clean
          make TARGET=apex_p BOLOS_SDK=$GITHUB_WORKSPACE/sdk
