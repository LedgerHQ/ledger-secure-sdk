name: Build all C apps on latest C SDK

on:
  workflow_dispatch:
    inputs:
      sdk_branch:
        type: string
        required: false
        default: ''
  pull_request:

# NOTE : changes made to this file in the context of  this PR will be reverted
#        these are just for the sake of testing the PR

jobs:
  build-docker:
    name: Build ledger-app-builder-lite
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_docker_deployment.yml@v1
    with:
      app_repository: LedgerHQ/ledger-app-builder
      app_ref: mbr/clang-21
      image_name: ledger-app-builder-lite-local
      dockerfile_path: lite/Dockerfile
      dry_run: true
      outputs: "type=docker,dest=/tmp/ledger-app-builder-lite-local.tar"
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      

  build-docker-full:
    name: Build ledger-app-builder
    needs: [build-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ledger-app-builder
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/ledger-app-builder
          ref: mbr/clang-21
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ledger-app-builder-lite image artifact
        uses: actions/download-artifact@v4
        with:
          name: ledger-app-builder-lite-local
          path: /tmp

      - name: Load ledger-app-builder-lite image
        run: |
          LOADED_IMAGE=$(docker load -i /tmp/ledger-app-builder-lite-local.tar | grep "Loaded image" | head -1 | awk '{print $NF}')
          docker tag "$LOADED_IMAGE" ledger-app-builder-lite:latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build ledger-app-builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: full/Dockerfile
          push: false
          tags: ledger-app-builder-local:latest

      - name: Export ledger-app-builder image to tar
        run: docker save ledger-app-builder-local:latest -o /tmp/ledger-app-builder-local.tar

      - name: Upload ledger-app-builder image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ledger-app-builder
          path: /tmp/ledger-app-builder-local.tar
          retention-days: 1

  check-clang-version-custom:
    name: Check clang version (custom image)
    needs: [build-docker-full]
    runs-on: ubuntu-latest
    steps:
      - name: Download ledger-app-builder image artifact
        uses: actions/download-artifact@v4
        with:
          name: ledger-app-builder
          path: /tmp

      - name: Check clang version
        run: |
          LOADED_IMAGE=$(docker load -i /tmp/ledger-app-builder-local.tar | grep "Loaded image" | head -1 | awk '{print $NF}')
          CLANG_VERSION=$(docker run --rm "$LOADED_IMAGE" clang --version)
          echo "$CLANG_VERSION"
          echo "## clang version (custom image)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CLANG_VERSION" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  check-clang-version-official:
    name: Check clang version (official image)
    runs-on: ubuntu-latest
    steps:
      - name: Check clang version
        run: |
          CLANG_VERSION=$(docker run --rm ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:5.0.2 clang --version)
          echo "$CLANG_VERSION"
          echo "## clang version (official image)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CLANG_VERSION" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  prepare-matrix:
    name: Retrieve C apps
    runs-on: ubuntu-latest
    outputs:
      c_apps: ${{ steps.get_c_apps.outputs.c_apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.x'
      - name: Install ledgered
        run: pip install ledgered
      - name: Get all C apps
        id: get_c_apps
        run: |
          python .github/workflows/scripts/get_c_apps.py ${{ secrets.GITHUB_TOKEN }}
          echo "c_apps=$(cat c_apps.json)" >> $GITHUB_OUTPUT

  print-matrix:
    needs: [prepare-matrix]
    runs-on: ubuntu-latest
    steps:
      - name: Print matrix
        run: |
          echo "Matrix content: ${{ needs.prepare-matrix.outputs.c_apps }}"

  test-build:
    name: Build for all targets
    needs: [prepare-matrix, build-docker-full]
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJSON(needs.prepare-matrix.outputs.c_apps) }}
    runs-on: ubuntu-latest

    steps:
      - name: Clone App
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/${{ matrix.apps.app-name }}
          submodules: recursive
          path: ${{ matrix.apps.app-name }}
      - name: Clone SDK
        uses: actions/checkout@v4
        with:
          path: sdk
          ref: ${{ inputs.sdk_branch }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: ledger-app-builder
          path: /tmp

      - name: Load Docker image and start build container
        run: |
          LOADED_IMAGE=$(docker load -i /tmp/ledger-app-builder-local.tar | grep "Loaded image" | head -1 | awk '{print $NF}')
          docker run -d --name builder -v $GITHUB_WORKSPACE:/workspace "$LOADED_IMAGE" sleep infinity
          docker exec builder pip install --break-system-packages ledgered

      - name: Create artifacts directory
        run: mkdir -p $GITHUB_WORKSPACE/artifacts

      - name: Build App for Nano X
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          docker exec builder bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Nano X' &&
            make clean &&
            make TARGET=nanox BOLOS_SDK=/workspace/sdk
          "
      - name: Collect Nano X binary
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox/bin/app.elf \
             artifacts/${{ matrix.apps.app-name }}-nanox.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox/dbg/app.map \
             artifacts/${{ matrix.apps.app-name }}-nanox.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts/nanox--$(basename "$f")"; done || true
      - name: Build App for Nano S+
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          docker exec builder bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Nano S+' &&
            make clean &&
            make TARGET=nanos2 BOLOS_SDK=/workspace/sdk
          "
      - name: Collect Nano S+ binary
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2/bin/app.elf \
             artifacts/${{ matrix.apps.app-name }}-nanosp.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2/dbg/app.map \
             artifacts/${{ matrix.apps.app-name }}-nanosp.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2 -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts/nanosp--$(basename "$f")"; done || true
      - name: Build App for Stax
        if: contains(matrix.apps.devices, 'stax')
        run: |
          docker exec builder bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Stax' &&
            make clean &&
            make TARGET=stax BOLOS_SDK=/workspace/sdk
          "
      - name: Collect Stax binary
        if: contains(matrix.apps.devices, 'stax')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax/bin/app.elf \
             artifacts/${{ matrix.apps.app-name }}-stax.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax/dbg/app.map \
             artifacts/${{ matrix.apps.app-name }}-stax.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts/stax--$(basename "$f")"; done || true
      - name: Build App for Flex
        if: contains(matrix.apps.devices, 'flex')
        run: |
          docker exec builder bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Flex' &&
            make clean &&
            make TARGET=flex BOLOS_SDK=/workspace/sdk
          "
      - name: Collect Flex binary
        if: contains(matrix.apps.devices, 'flex')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex/bin/app.elf \
             artifacts/${{ matrix.apps.app-name }}-flex.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex/dbg/app.map \
             artifacts/${{ matrix.apps.app-name }}-flex.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts/flex--$(basename "$f")"; done || true
      - name: Build App for Apex+
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          docker exec builder bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Apex+' &&
            make clean &&
            make TARGET=apex_p BOLOS_SDK=/workspace/sdk
          "
      - name: Collect Apex+ binary
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p/bin/app.elf \
             artifacts/${{ matrix.apps.app-name }}-apex_p.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p/dbg/app.map \
             artifacts/${{ matrix.apps.app-name }}-apex_p.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts/apex_p--$(basename "$f")"; done || true

      - name: Upload app binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.apps.app-name }}-binaries
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 1

      - name: Cleanup
        if: always()
        run: docker rm -f builder || true

  test-build-official:
    name: Build for all targets (official image)
    needs: [prepare-matrix]
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJSON(needs.prepare-matrix.outputs.c_apps) }}
    runs-on: ubuntu-latest

    steps:
      - name: Clone App
        uses: actions/checkout@v4
        with:
          repository: LedgerHQ/${{ matrix.apps.app-name }}
          submodules: recursive
          path: ${{ matrix.apps.app-name }}

      - name: Pull official Docker image and start build container
        run: |
          docker pull ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:5.0.2
          docker run -d --name builder-official -v $GITHUB_WORKSPACE:/workspace ghcr.io/ledgerhq/ledger-app-builder/ledger-app-builder:5.0.2 sleep infinity
          docker exec builder-official pip install --break-system-packages ledgered

      - name: Patch SDK Makefile.defines to add -fstack-usage
        run: |
          docker exec builder-official bash -c "
            for sdk in /opt/nanos-secure-sdk /opt/nanox-secure-sdk /opt/nanosplus-secure-sdk /opt/stax-secure-sdk /opt/flex-secure-sdk /opt/apex-secure-sdk; do
              if [ -f \"\$sdk/Makefile.defines\" ]; then
                sed -i 's/CFLAGS   += -Wall -Wextra$/CFLAGS   += -Wall -Wextra -fstack-usage/' \"\$sdk/Makefile.defines\"
              fi
            done
          "

      - name: Create artifacts directory
        run: mkdir -p $GITHUB_WORKSPACE/artifacts-official

      - name: Build App for Nano X
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          docker exec builder-official bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Nano X' &&
            make clean &&
            make TARGET=nanox BOLOS_SDK=/opt/nanox-secure-sdk
          "
      - name: Collect Nano X binary
        if: contains(matrix.apps.devices, 'nanox')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox/bin/app.elf \
             artifacts-official/${{ matrix.apps.app-name }}-nanox.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox/dbg/app.map \
             artifacts-official/${{ matrix.apps.app-name }}-nanox.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanox -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts-official/nanox--$(basename "$f")"; done || true
      - name: Build App for Nano S+
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          docker exec builder-official bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Nano S+' &&
            make clean &&
            make TARGET=nanos2 BOLOS_SDK=/opt/nanosplus-secure-sdk
          "
      - name: Collect Nano S+ binary
        if: contains(matrix.apps.devices, 'nanos+')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2/bin/app.elf \
             artifacts-official/${{ matrix.apps.app-name }}-nanosp.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2/dbg/app.map \
             artifacts-official/${{ matrix.apps.app-name }}-nanosp.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/nanos2 -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts-official/nanosp--$(basename "$f")"; done || true
      - name: Build App for Stax
        if: contains(matrix.apps.devices, 'stax')
        run: |
          docker exec builder-official bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Stax' &&
            make clean &&
            make TARGET=stax BOLOS_SDK=/opt/stax-secure-sdk
          "
      - name: Collect Stax binary
        if: contains(matrix.apps.devices, 'stax')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax/bin/app.elf \
             artifacts-official/${{ matrix.apps.app-name }}-stax.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax/dbg/app.map \
             artifacts-official/${{ matrix.apps.app-name }}-stax.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/stax -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts-official/stax--$(basename "$f")"; done || true
      - name: Build App for Flex
        if: contains(matrix.apps.devices, 'flex')
        run: |
          docker exec builder-official bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Flex' &&
            make clean &&
            make TARGET=flex BOLOS_SDK=/opt/flex-secure-sdk
          "
      - name: Collect Flex binary
        if: contains(matrix.apps.devices, 'flex')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex/bin/app.elf \
             artifacts-official/${{ matrix.apps.app-name }}-flex.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex/dbg/app.map \
             artifacts-official/${{ matrix.apps.app-name }}-flex.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/flex -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts-official/flex--$(basename "$f")"; done || true
      - name: Build App for Apex+
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          docker exec builder-official bash -c "
            cd /workspace/${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }} &&
            echo 'Building for Apex+' &&
            make clean &&
            make TARGET=apex_p BOLOS_SDK=/opt/apex-secure-sdk
          "
      - name: Collect Apex+ binary
        if: contains(matrix.apps.devices, 'apex_p')
        run: |
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p/bin/app.elf \
             artifacts-official/${{ matrix.apps.app-name }}-apex_p.elf || true
          cp ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p/dbg/app.map \
             artifacts-official/${{ matrix.apps.app-name }}-apex_p.map || true
          find ${{ matrix.apps.app-name }}/${{ matrix.apps.build-directory }}/build/apex_p -name "*.su" | while IFS= read -r f; do cp "$f" "artifacts-official/apex_p--$(basename "$f")"; done || true

      - name: Upload app binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.apps.app-name }}-binaries-official
          path: artifacts-official/
          if-no-files-found: ignore
          retention-days: 1

      - name: Cleanup
        if: always()
        run: docker rm -f builder-official || true

  compare:
    name: Compare builds
    needs: [prepare-matrix, test-build, test-build-official]
    if: always()
    strategy:
      fail-fast: false
      matrix:
        apps: ${{ fromJSON(needs.prepare-matrix.outputs.c_apps) }}
    runs-on: ubuntu-latest

    steps:
      - name: Download custom build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.apps.app-name }}-binaries
          path: custom/
        continue-on-error: true

      - name: Download official build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.apps.app-name }}-binaries-official
          path: official/
        continue-on-error: true

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-arm-none-eabi

      - name: Generate binary comparison report
        run: |
          APP_NAME="${{ matrix.apps.app-name }}"
          mkdir -p report
          OUT="report/binary_comparison.md"

          echo "# Binary Comparison Report: $APP_NAME" >> "$OUT"
          echo "" >> "$OUT"
          echo "Comparing builds between **clang-14 (official)** and **clang-21 (custom)**" >> "$OUT"
          echo "" >> "$OUT"
          echo "| Toolchain | Device | Binary Size | .text | .data | .bss | .rodata |" >> "$OUT"
          echo "|-----------|--------|-------------|-------|-------|------|---------|" >> "$OUT"

          for device_key in nanox nanosp stax flex apex_p; do
            OFFICIAL_ELF="official/${APP_NAME}-${device_key}.elf"
            CUSTOM_ELF="custom/${APP_NAME}-${device_key}.elf"
            if [ ! -f "$OFFICIAL_ELF" ] && [ ! -f "$CUSTOM_ELF" ]; then continue; fi
            case $device_key in
              nanox) DEVICE_NAME="Nano X" ;;
              nanosp) DEVICE_NAME="Nano S+" ;;
              stax) DEVICE_NAME="Stax" ;;
              flex) DEVICE_NAME="Flex" ;;
              apex_p) DEVICE_NAME="Apex+" ;;
            esac

            if [ -f "$OFFICIAL_ELF" ]; then
              SIZE_OUTPUT=$(arm-none-eabi-size "$OFFICIAL_ELF" 2>&1)
              SIZE_OFF=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $1+$2}')
              TEXT_OFF=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $1}')
              DATA_OFF=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $2}')
              BSS_OFF=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $3}')
              RODATA_OFF=$(arm-none-eabi-size -A "$OFFICIAL_ELF" 2>&1 | grep "^\.rodata" | awk '{print $2}')
              RODATA_OFF=${RODATA_OFF:-0}
              echo "| **clang-14** | $DEVICE_NAME | $SIZE_OFF | $TEXT_OFF | $DATA_OFF | $BSS_OFF | $RODATA_OFF |" >> "$OUT"
            fi

            if [ -f "$CUSTOM_ELF" ]; then
              SIZE_OUTPUT=$(arm-none-eabi-size "$CUSTOM_ELF" 2>&1)
              SIZE_CUST=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $1+$2}')
              TEXT_CUST=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $1}')
              DATA_CUST=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $2}')
              BSS_CUST=$(echo "$SIZE_OUTPUT" | tail -n1 | awk '{print $3}')
              RODATA_CUST=$(arm-none-eabi-size -A "$CUSTOM_ELF" 2>&1 | grep "^\.rodata" | awk '{print $2}')
              RODATA_CUST=${RODATA_CUST:-0}
              echo "| **clang-21** | $DEVICE_NAME | $SIZE_CUST | $TEXT_CUST | $DATA_CUST | $BSS_CUST | $RODATA_CUST |" >> "$OUT"

              if [ -f "$OFFICIAL_ELF" ] && [ -n "$SIZE_OFF" ] && [ -n "$SIZE_CUST" ]; then
                DIFF=$((SIZE_CUST - SIZE_OFF))
                DIFF_STR=$([ $DIFF -gt 0 ] && echo "+$DIFF" || echo "$DIFF")
                if [ $SIZE_OFF -ne 0 ]; then
                  PERCENT=$(awk "BEGIN {printf \"%.2f\", ($DIFF / $SIZE_OFF) * 100}")
                  echo "| _Δ_ | | $DIFF_STR ($PERCENT%) | | | | |" >> "$OUT"
                else
                  echo "| _Δ_ | | $DIFF_STR | | | | |" >> "$OUT"
                fi
              fi
            fi
            echo "| | | | | | | |" >> "$OUT"
          done

          echo "" >> "$OUT"
          echo "## Detailed Section Analysis" >> "$OUT"
          echo "" >> "$OUT"

          for device_key in nanox nanosp stax flex apex_p; do
            OFFICIAL_ELF="official/${APP_NAME}-${device_key}.elf"
            CUSTOM_ELF="custom/${APP_NAME}-${device_key}.elf"
            if [ ! -f "$OFFICIAL_ELF" ] || [ ! -f "$CUSTOM_ELF" ]; then continue; fi
            case $device_key in
              nanox) DEVICE_NAME="Nano X" ;;
              nanosp) DEVICE_NAME="Nano S+" ;;
              stax) DEVICE_NAME="Stax" ;;
              flex) DEVICE_NAME="Flex" ;;
              apex_p) DEVICE_NAME="Apex+" ;;
            esac
            echo "### $DEVICE_NAME" >> "$OUT"
            echo "" >> "$OUT"
            echo '```' >> "$OUT"
            echo "=== Official (clang-14) ===" >> "$OUT"
            arm-none-eabi-size -A "$OFFICIAL_ELF" >> "$OUT"
            echo "" >> "$OUT"
            echo "=== Custom (clang-21) ===" >> "$OUT"
            arm-none-eabi-size -A "$CUSTOM_ELF" >> "$OUT"
            echo '```' >> "$OUT"
            echo "" >> "$OUT"
          done

      - name: Generate map file comparison report
        run: |
          cat << 'PYEOF' > parse_maps.py
          import re, os, sys
          from pathlib import Path
          from collections import defaultdict

          DEVICES = [
              ('nanox',  'Nano X'),
              ('nanosp', 'Nano S+'),
              ('stax',   'Stax'),
              ('flex',   'Flex'),
              ('apex_p', 'Apex+'),
          ]
          SECTIONS = ['.text', '.rodata', '.data', '.bss']
          APP = os.environ['APP_NAME']
          OUT = 'report/map_comparison.md'

          def parse_map(path):
              result = defaultdict(lambda: defaultdict(int))
              current_section = None
              HEX = r'[0-9a-f]+'
              try:
                  with open(path) as f:
                      for line in f:
                          s = line.rstrip()
                          m = re.match(rf'^({HEX})\s+({HEX})\s+({HEX})\s+(\d+)\s+(.*)', s, re.I)
                          if not m:
                              continue
                          size = int(m.group(3), 16)
                          name = m.group(5).strip()
                          if re.match(r'^\.\w[\w.]*$', name):
                              current_section = name
                              continue
                          im = re.match(r'^(\S+):\((\.\w[\w.]*)\)\s*$', name)
                          if im and current_section and im.group(2).startswith(current_section) and size > 0:
                              result[current_section][Path(im.group(1)).name] += size
              except Exception as e:
                  print(f"Warning: could not parse {path}: {e}", file=sys.stderr)
              return result

          def fmt_delta(d, ref):
              sign = '+' if d >= 0 else ''
              pct = f' ({sign}{d/ref*100:.1f}%)' if ref else ''
              return f'{sign}{d}{pct}'

          with open(OUT, 'w') as out:
              out.write(f'# Map file comparison: {APP}\n\n')
              out.write('Comparing symbol sizes between **clang-14 (official)** and **clang-21 (custom)**\n\n')

              found_any = False
              for dev_key, dev_name in DEVICES:
                  old_map = Path(f'official/{APP}-{dev_key}.map')
                  new_map = Path(f'custom/{APP}-{dev_key}.map')
                  if not old_map.exists() and not new_map.exists():
                      continue
                  found_any = True
                  out.write(f'## {dev_name}\n\n')
                  if not old_map.exists():
                      out.write('_No official map file available for this device._\n\n')
                      continue
                  if not new_map.exists():
                      out.write('_No custom map file available for this device._\n\n')
                      continue

                  old_data = parse_map(old_map)
                  new_data = parse_map(new_map)

                  for sec in SECTIONS:
                      all_objs = set(old_data[sec]) | set(new_data[sec])
                      if not all_objs:
                          continue
                      rows = []
                      for obj in all_objs:
                          o = old_data[sec].get(obj, 0)
                          n = new_data[sec].get(obj, 0)
                          d = n - o
                          if d != 0:
                              rows.append((obj, o, n, d))
                      rows.sort(key=lambda x: abs(x[3]), reverse=True)
                      if not rows:
                          continue
                      out.write(f'<details>\n')
                      out.write(f'<summary><code>{sec}</code> — {len(rows)} object(s) changed</summary>\n\n')
                      out.write('| Object | clang-14 | clang-21 | Δ |\n')
                      out.write('|--------|----------|----------|---|\n')
                      for obj, o, n, d in rows:
                          out.write(f'| `{obj}` | {o} | {n} | {fmt_delta(d, o)} |\n')
                      out.write('\n</details>\n\n')
                  out.write('---\n\n')

              if not found_any:
                  out.write('_No map files found for any device._\n\n')
          PYEOF
          python3 parse_maps.py
        env:
          APP_NAME: ${{ matrix.apps.app-name }}

      - name: Generate stack usage report
        run: |
          cat << 'PYEOF' > parse_stack.py
          import os, sys, glob
          from pathlib import Path

          DEVICES = [
              ('nanox',  'Nano X'),
              ('nanosp', 'Nano S+'),
              ('stax',   'Stax'),
              ('flex',   'Flex'),
              ('apex_p', 'Apex+'),
          ]
          APP = os.environ['APP_NAME']
          OUT = 'report/stack_usage.md'

          def parse_su_files(directory, device_prefix):
              result = {}
              pattern = os.path.join(directory, f'{device_prefix}--*.su')
              for su_file in glob.glob(pattern):
                  try:
                      with open(su_file) as f:
                          for line in f:
                              line = line.strip()
                              if not line:
                                  continue
                              parts = line.split('\t')
                              if len(parts) < 2:
                                  continue
                              location = parts[0]
                              try:
                                  size = int(parts[1])
                              except ValueError:
                                  continue
                              func = location.rsplit(':', 1)[-1]
                              if func not in result or result[func] < size:
                                  result[func] = size
                  except Exception as e:
                      print(f'Warning: could not parse {su_file}: {e}', file=sys.stderr)
              return result

          with open(OUT, 'w') as out:
              out.write(f'# Stack usage comparison: {APP}\n\n')
              out.write('Functions whose stack usage differs between **clang-14 (official)** and **clang-21 (custom)**.\n\n')
              out.write('Only functions with a non-zero delta are listed, sorted by delta (descending).\n\n')

              found_any = False
              for dev_key, dev_name in DEVICES:
                  old_data = parse_su_files('official', dev_key)
                  new_data = parse_su_files('custom', dev_key)
                  if not old_data and not new_data:
                      continue

                  rows = []
                  for func in set(old_data) | set(new_data):
                      old_sz = old_data.get(func, 0)
                      new_sz = new_data.get(func, 0)
                      delta = new_sz - old_sz
                      if delta != 0:
                          rows.append((func, old_sz, new_sz, delta))
                  rows.sort(key=lambda x: x[3], reverse=True)

                  found_any = True
                  out.write(f'## {dev_name}\n\n')
                  if not rows:
                      out.write('_No functions with increased stack usage._\n\n')
                  else:
                      out.write('| Function | clang-14 (bytes) | clang-21 (bytes) | Δ (bytes) |\n')
                      out.write('|----------|-----------------|-----------------|----------|\n')
                      for func, old_sz, new_sz, delta in rows:
                          sign = '+' if delta > 0 else ''
                          pct = f' ({sign}{delta/old_sz*100:.1f}%)' if old_sz else ''
                          out.write(f'| `{func}` | {old_sz} | {new_sz} | {sign}{delta}{pct} |\n')
                      out.write('\n')
                  out.write('---\n\n')

              if not found_any:
                  out.write('_No stack usage files found for any device._\n\n')
          PYEOF
          python3 parse_stack.py
        env:
          APP_NAME: ${{ matrix.apps.app-name }}

      - name: Package report
        run: |
          tar -czf report-${{ matrix.apps.app-name }}.tar.gz report/

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.apps.app-name }}
          path: report-${{ matrix.apps.app-name }}.tar.gz
          retention-days: 7

