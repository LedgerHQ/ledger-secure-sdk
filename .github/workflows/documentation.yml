name: Documentation generation & update

on:
  push:
    tags:
      - '*'
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # false: queue new runs instead of cancelling the in-progress one, to avoid
  # leaving GitHub Pages in a broken state if a deployment is interrupted.
  cancel-in-progress: false

jobs:
  generate:
    name: Generate the documentation
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install APT dependencies
        run: |
          sudo apt-get update
          sudo apt-get install graphviz doxygen
      - name: Generate the documentation
        run: make doc
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/doc/html/

  deploy:
    name: Deploy the documentation on Github pages
    runs-on: ubuntu-latest
    needs: generate
    if: github.event_name == 'push'  && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
